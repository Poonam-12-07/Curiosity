<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindergarten Homework Page - Version 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff8f0;
            --primary-orange: #ff9f1c;
            --secondary-orange: #ffbf69;
            --accent-blue: #a2d2ff;
            --accent-purple: #c8b6ff;
            --text-color: #4a4a4a;
            --green-signal: #06f316;
            --white: #ffffff;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 2px solid var(--secondary-orange);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '⭐';
            position: absolute;
            top: -10px;
            left: -10px;
            font-size: 80px;
            color: var(--secondary-orange);
            opacity: 0.15;
            pointer-events: none;
        }

        h1 {
            text-align: center;
            color: var(--primary-orange);
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.8);
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 20px;
        }

        .input-group {
            flex: 1;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-orange);
        }

        input[type="text"],
        input[type="date"],
        .math-input,
        .sentence-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--secondary-orange);
            border-radius: 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            background: white;
        }

        input:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 10px rgba(255, 159, 28, 0.2);
        }

        .homework-sections {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 159, 28, 0.1);
        }

        .section-content {
            flex: 1;
        }

        .section-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .math-row {
            display: flex;
            align-items: center;
            font-size: 1.8rem;
            gap: 15px;
            color: var(--text-color);
        }

        .math-input {
            width: 80px;
            text-align: center;
            font-size: 1.8rem;
            padding: 5px;
        }

        .sentence-input-container {
            margin-top: 10px;
        }

        .sentence-label {
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: block;
        }

        .sentence-input {
            border-top: none;
            border-left: none;
            border-right: none;
            border-radius: 0;
            border-bottom: 3px dashed var(--secondary-orange);
            padding: 5px;
            font-size: 1.3rem;
        }

        .sight-words {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sight-word-tag {
            background: var(--accent-purple);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
        }

        .checkbox-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid var(--secondary-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            flex-shrink: 0;
            margin-left: 20px;
        }

        .checkbox-circle.checked {
            background-color: var(--green-signal);
            border-color: var(--green-signal);
            box-shadow: 0 0 15px rgba(122, 229, 130, 0.5);
        }

        .checkbox-circle::after {
            content: '✓';
            color: white;
            font-size: 1.8rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .checkbox-circle.checked::after {
            opacity: 1;
        }

        .game-button-container {
            margin-top: 40px;
            text-align: center;
        }

        #gameButton {
            background-color: #ccc;
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.5rem;
            font-family: 'Fredoka', sans-serif;
            border-radius: 50px;
            cursor: not-allowed;
            transition: all 0.3s ease;
            box-shadow: 0 6px 0px #bbb;
            position: relative;
            top: 0;
        }

        #gameButton.enabled {
            background-color: var(--accent-blue);
            cursor: pointer;
            box-shadow: 0 6px 0px #7ab6e6;
        }

        #gameButton.enabled:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0px #7ab6e6;
        }

        #gameButton.enabled:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #7ab6e6;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .pop-anim {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Chat Widget Styles */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .chat-button {
            background-color: var(--accent-purple);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(200, 182, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            outline: none;
        }

        .chat-button:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .chat-window {
            width: 350px;
            height: 450px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid var(--accent-purple);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .chat-header {
            background: var(--accent-purple);
            color: white;
            padding: 15px 20px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fdfbff;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.bot {
            align-self: flex-start;
            background: #f0ecff;
            color: var(--text-color);
            border-bottom-left-radius: 5px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-blue);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
            background: white;
        }

        .chat-input {
            flex: 1;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 8px 12px;
            outline: none;
            font-family: 'Fredoka', sans-serif;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: var(--accent-purple);
        }

        .chat-send {
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 15px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="weather-display"
            style="text-align: right; color: var(--accent-blue); font-size: 0.9rem; margin-bottom: -20px;">
            Loading weather... ☁️
        </div>
        <h1>Homework Time! ⭐</h1>

        <div class="header-info">
            <div class="input-group">
                <label for="studentName">My Name</label>
                <input type="text" id="studentName" placeholder="Type name here...">
            </div>
            <div class="input-group">
                <label for="homeworkDate">Date</label>
                <input type="date" id="homeworkDate">
            </div>
        </div>

        <div class="header-content">
            <h1>Liana's Kindergarten Fun! 🌟</h1>
            <div class="header-actions">
                <a href="shape.html" class="game-link-btn" title="Play Ice Cream Shape Game">🍦 Play Game!</a>
                <div id="weather" class="weather-report">Tracy: --°C --</div>
            </div>
        </div>
        <div class="homework-sections">
            <!-- Math Section -->
            <div class="section-card">
                <div class="section-content">
                    <div class="section-title">Math One</div>
                    <div class="math-row">
                        <span>1 + 1 =</span>
                        <input type="text" class="math-input" placeholder="?">
                        <span>🍎</span>
                    </div>
                </div>
                <div class="checkbox-circle" id="check-math" onclick="toggleCheck('check-math')"></div>
            </div>

            <!-- Sentence Section -->
            <div class="section-card">
                <div class="section-content">
                    <div class="section-title">Sentence</div>
                    <div class="sentence-input-container">
                        <span class="sentence-label">Type "The cat sat on the mat." below:</span>
                        <input type="text" class="sentence-input" placeholder="Type here...">
                        <span>🐱</span>
                    </div>
                </div>
                <div class="checkbox-circle" id="check-sentence" onclick="toggleCheck('check-sentence')"></div>
            </div>

            <!-- Sight Word Section -->
            <div class="section-card">
                <div class="section-content">
                    <div class="section-title">Sight Words</div>
                    <div class="sight-words">
                        <span class="sight-word-tag">the</span>
                        <span class="sight-word-tag">and</span>
                        <span class="sight-word-tag">for</span>
                        <span class="sight-word-tag">you</span>
                        <span class="sight-word-tag">is</span>
                    </div>
                </div>
                <div class="checkbox-circle" id="check-sight" onclick="toggleCheck('check-sight')"></div>
            </div>
        </div>

        <div class="game-button-container">
            <button id="gameButton" disabled>Diagonal Game! 🎮</button>
        </div>
    </div>

    <!-- Chat Widget -->
    <div class="chat-widget">
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span>Weather Pal 🌤️</span>
                <span style="cursor: pointer;" onclick="toggleChat()">✕</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">Hi there! Ask me about the weather anywhere! 🌍</div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a city..."
                    onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="chat-send" onclick="sendMessage()">Send</button>
            </div>
        </div>
        <button class="chat-button" onclick="toggleChat()" id="chatBtn">💬</button>
    </div>

    <script>
        function toggleCheck(id) {
            const checkbox = document.getElementById(id);
            checkbox.classList.toggle('checked');

            if (checkbox.classList.contains('checked')) {
                checkbox.classList.add('pop-anim');
                setTimeout(() => checkbox.classList.remove('pop-anim'), 400);
            }

            checkCompletion();
        }

        function checkCompletion() {
            const mathDone = document.getElementById('check-math').classList.contains('checked');
            const sentenceDone = document.getElementById('check-sentence').classList.contains('checked');
            const sightDone = document.getElementById('check-sight').classList.contains('checked');

            const gameButton = document.getElementById('gameButton');

            if (mathDone && sentenceDone && sightDone) {
                gameButton.disabled = false;
                gameButton.classList.add('enabled');
            } else {
                gameButton.disabled = true;
                gameButton.classList.remove('enabled');
            }
        }

        document.getElementById('homeworkDate').valueAsDate = new Date();

        // Fetch weather data
        async function fetchWeather() {
            try {
                const response = await fetch('/weather');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('weather-display').innerHTML =
                        `${data.city}: ${data.temp}°C ${getWeatherEmoji(data.description)}`;
                } else {
                    document.getElementById('weather-display').innerHTML = "Weather not available ☁️";
                }
            } catch (error) {
                console.error("Error fetching weather:", error);
                document.getElementById('weather-display').innerHTML = "Weather not available ☁️";
            }
        }

        function getWeatherEmoji(desc) {
            desc = desc.toLowerCase();
            if (desc.includes('sun') || desc.includes('clear')) return '☀️';
            if (desc.includes('cloud')) return '☁️';
            if (desc.includes('rain')) return '🌧️';
            if (desc.includes('snow')) return '❄️';
            return '🌤️';
        }

        fetchWeather();

        // Chat Logic
        function toggleChat() {
            const window = document.getElementById('chatWindow');
            const btn = document.getElementById('chatBtn');
            if (window.style.display === 'flex') {
                window.style.display = 'none';
                btn.innerHTML = '💬';
            } else {
                window.style.display = 'flex';
                btn.innerHTML = '✕';
                document.getElementById('chatInput').focus();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            // Add user message to UI
            addMessage(message, 'user');
            input.value = '';

            // Add loading message
            const loadingId = 'loading-' + Date.now();
            addMessage('Thinking... 🤔', 'bot', loadingId);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();
                addMessage(data.reply, 'bot');
            } catch (error) {
                document.getElementById(loadingId).innerHTML = "Oops! I couldn't connect to my weather brain. 🧠❌";
            }
        }

        function addMessage(text, sender, id = null) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if (id) div.id = id;
            div.innerText = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>

</body>

</html>
